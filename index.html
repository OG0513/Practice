<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Bouquet</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ── helpers ──────────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOut(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
function easeOutElastic(t) {
  const c4 = (2*Math.PI)/3;
  return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1;
}

// ── colour helpers ────────────────────────────────────────────────────────────
function hex2rgb(h) {
  const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
  return [r,g,b];
}
function rgba(h, a) { const [r,g,b] = hex2rgb(h); return `rgba(${r},${g},${b},${a})`; }

// ── glow stroke helper ────────────────────────────────────────────────────────
function glowStroke(color, lineWidth, blur, alpha=1) {
  ctx.shadowColor = color;
  ctx.shadowBlur  = blur;
  ctx.strokeStyle = rgba(color, alpha);
  ctx.lineWidth   = lineWidth;
}
function glowFill(color, blur, alpha=1) {
  ctx.shadowColor = color;
  ctx.shadowBlur  = blur;
  ctx.fillStyle   = rgba(color, alpha);
}

// ── stem bezier evaluator ─────────────────────────────────────────────────────
function cubicBezier(p0,p1,p2,p3,t) {
  const mt=1-t;
  return [
    mt*mt*mt*p0[0]+3*mt*mt*t*p1[0]+3*mt*t*t*p2[0]+t*t*t*p3[0],
    mt*mt*mt*p0[1]+3*mt*mt*t*p1[1]+3*mt*t*t*p2[1]+t*t*t*p3[1]
  ];
}

// ── draw a leaf at a point along a stem ──────────────────────────────────────
function drawLeaf(x, y, angle, size, color, alpha) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha;

  // Leaf body
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-size*0.4, -size*0.5, -size*0.3, -size, 0, -size*1.1);
  ctx.bezierCurveTo( size*0.3, -size, size*0.4, -size*0.5, 0, 0);
  ctx.closePath();

  const lg = ctx.createLinearGradient(0, 0, 0, -size*1.1);
  lg.addColorStop(0, 'rgba(10,80,10,0.9)');
  lg.addColorStop(0.4, rgba(color, 0.92));
  lg.addColorStop(1, rgba(color, 0.7));
  ctx.fillStyle = lg;
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.fill();

  // Midrib
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, -size*1.05);
  ctx.strokeStyle = 'rgba(0,180,0,0.5)';
  ctx.lineWidth = 0.8;
  ctx.shadowBlur = 4;
  ctx.stroke();

  // Veins
  for (let i = 1; i <= 4; i++) {
    const vt = i / 5;
    const vy = -size * vt;
    const vx = size * 0.28 * Math.sin(vt * Math.PI);
    ctx.beginPath();
    ctx.moveTo(0, vy);
    ctx.lineTo( vx, vy - size*0.12);
    ctx.moveTo(0, vy);
    ctx.lineTo(-vx, vy - size*0.12);
    ctx.strokeStyle = 'rgba(80,220,80,0.35)';
    ctx.lineWidth = 0.6;
    ctx.shadowBlur = 2;
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── draw stem segment as thick bezier ────────────────────────────────────────
function drawStemSegment(p0, p1, p2, p3, progress, color, width) {
  if (progress <= 0) return;
  const steps = 60;
  const end = Math.floor(progress * steps);
  ctx.beginPath();
  for (let i = 0; i <= end; i++) {
    const t = i / steps;
    const [x, y] = cubicBezier(p0, p1, p2, p3, t);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  // Extra partial step
  if (end < steps) {
    const t0 = end / steps, t1 = progress;
    const [x, y] = cubicBezier(p0, p1, p2, p3, lerp(t0, t1, 1));
    ctx.lineTo(x, y);
  }

  // Stem gradient green
  const startPt = cubicBezier(p0,p1,p2,p3,0);
  const endPt   = cubicBezier(p0,p1,p2,p3,progress);
  const lg = ctx.createLinearGradient(startPt[0], startPt[1], endPt[0], endPt[1]);
  lg.addColorStop(0, '#1a5c00');
  lg.addColorStop(0.5, '#2eb800');
  lg.addColorStop(1, '#5dfc00');
  ctx.strokeStyle = lg;
  ctx.shadowColor = '#3aff00';
  ctx.shadowBlur  = 10;
  ctx.lineWidth   = width;
  ctx.lineCap     = 'round';
  ctx.stroke();
  ctx.shadowBlur  = 0;
}

// ── FLOWER DRAWERS ────────────────────────────────────────────────────────────

// Rose — layered petals, realistic
function drawRose(cx, cy, r, color, bloom) {
  if (bloom <= 0) return;
  const petalLayers = [
    { count:5, dist:0.25, rx:0.22, ry:0.38, rot:0,   col:darken(color,0.7), alpha:0.9 },
    { count:6, dist:0.42, rx:0.26, ry:0.42, rot:18,  col:color,             alpha:0.85},
    { count:7, dist:0.60, rx:0.28, ry:0.44, rot:8,   col:lighten(color,0.3),alpha:0.8 },
    { count:8, dist:0.72, rx:0.26, ry:0.38, rot:25,  col:lighten(color,0.5),alpha:0.75},
  ];
  const maxLayer = Math.floor(bloom * petalLayers.length);
  const partialBloom = (bloom * petalLayers.length) % 1;

  for (let l = 0; l < petalLayers.length; l++) {
    const layer = petalLayers[l];
    const layerAlpha = l < maxLayer ? 1 : (l === maxLayer ? partialBloom : 0);
    if (layerAlpha <= 0) continue;
    for (let i = 0; i < layer.count; i++) {
      const angle = (i / layer.count) * Math.PI * 2 + (layer.rot * Math.PI / 180);
      const px = cx + r * layer.dist * Math.cos(angle - Math.PI/2);
      const py = cy + r * layer.dist * Math.sin(angle - Math.PI/2);
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.ellipse(0, 0, r*layer.rx, r*layer.ry, 0, 0, Math.PI*2);
      ctx.fillStyle = rgba(layer.col, layer.alpha * layerAlpha);
      ctx.shadowColor = color;
      ctx.shadowBlur  = 18;
      ctx.fill();
      ctx.restore();
    }
  }
  // Centre
  ctx.beginPath();
  ctx.arc(cx, cy, r*0.18, 0, Math.PI*2);
  const cg = ctx.createRadialGradient(cx, cy-r*0.05, 0, cx, cy, r*0.18);
  cg.addColorStop(0, lighten(color, 0.8));
  cg.addColorStop(1, darken(color, 0.4));
  ctx.fillStyle = cg;
  ctx.shadowColor = lighten(color,0.6);
  ctx.shadowBlur  = 20;
  ctx.fill();
}

// Tulip — cupped petals
function drawTulip(cx, cy, r, color, bloom) {
  if (bloom <= 0) return;
  const outerC = color, innerC = lighten(color, 0.4);
  const petals = [
    { a:-0.4, col:darken(color,0.3) },
    { a: 0,   col:color },
    { a: 0.4, col:darken(color,0.3) },
    { a:-0.15,col:innerC },
    { a: 0.15,col:innerC },
  ];
  const scale = easeOutElastic(Math.min(bloom, 1));
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  for (const p of petals) {
    ctx.save();
    ctx.rotate(p.a);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-r*0.4, -r*0.5, -r*0.35, -r*1.1, 0, -r*1.2);
    ctx.bezierCurveTo( r*0.35, -r*1.1, r*0.4, -r*0.5,  0,  0);
    ctx.fillStyle = rgba(p.col, 0.92);
    ctx.shadowColor = color;
    ctx.shadowBlur  = 22;
    ctx.fill();
    // Highlight stripe
    ctx.beginPath();
    ctx.moveTo(0, -r*0.1);
    ctx.bezierCurveTo(-r*0.05, -r*0.5, -r*0.03, -r*0.95, 0, -r*1.1);
    ctx.strokeStyle = rgba(lighten(color, 0.6), 0.4);
    ctx.lineWidth = r*0.06;
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

// Sunflower — yellow petals, brown disc
function drawSunflower(cx, cy, r, bloom) {
  if (bloom <= 0) return;
  const scale = easeOutElastic(Math.min(bloom, 1));
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  const n = 20;
  for (let i = 0; i < n; i++) {
    const angle = (i/n)*Math.PI*2;
    ctx.save();
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(0, -r*0.72, r*0.14, r*0.38, 0, 0, Math.PI*2);
    const lg = ctx.createLinearGradient(0, -r*0.4, 0, -r*1.1);
    lg.addColorStop(0, 'rgba(255,190,0,0.95)');
    lg.addColorStop(0.5,'rgba(255,220,30,0.9)');
    lg.addColorStop(1, 'rgba(255,240,80,0.8)');
    ctx.fillStyle = lg;
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur  = 20;
    ctx.fill();
    ctx.restore();
  }
  // Inner ring
  for (let i = 0; i < n; i++) {
    const angle = (i/n)*Math.PI*2 + Math.PI/n;
    ctx.save();
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(0, -r*0.60, r*0.10, r*0.28, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,160,0,0.7)';
    ctx.fill();
    ctx.restore();
  }
  // Disc
  const dg = ctx.createRadialGradient(0, 0, 0, 0, 0, r*0.36);
  dg.addColorStop(0, '#8B4513');
  dg.addColorStop(0.5,'#5C2E00');
  dg.addColorStop(1, '#3a1a00');
  ctx.beginPath();
  ctx.arc(0, 0, r*0.36, 0, Math.PI*2);
  ctx.fillStyle = dg;
  ctx.shadowColor = '#ff8800';
  ctx.shadowBlur  = 15;
  ctx.fill();
  // Disc pattern
  for (let i = 0; i < 24; i++) {
    const a = (i/24)*Math.PI*2;
    for (let rr = 0.05; rr < 0.35; rr += 0.08) {
      ctx.beginPath();
      ctx.arc(r*rr*Math.cos(a), r*rr*Math.sin(a), r*0.025, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(60,20,0,0.5)';
      ctx.shadowBlur = 0;
      ctx.fill();
    }
  }
  ctx.restore();
}

// Daisy — white/pastel petals, yellow centre
function drawDaisy(cx, cy, r, color, bloom) {
  if (bloom <= 0) return;
  const scale = easeOutElastic(Math.min(bloom,1));
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  const n = 16;
  for (let i = 0; i < n; i++) {
    const angle = (i/n)*Math.PI*2;
    ctx.save();
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(0, -r*0.58, r*0.10, r*0.32, 0, 0, Math.PI*2);
    ctx.fillStyle = rgba(color, 0.95);
    ctx.shadowColor = color;
    ctx.shadowBlur  = 18;
    ctx.fill();
    ctx.restore();
  }
  // Centre
  const cg = ctx.createRadialGradient(0,-r*0.05,0, 0,0,r*0.28);
  cg.addColorStop(0, '#fff176');
  cg.addColorStop(0.6,'#ffcc00');
  cg.addColorStop(1, '#e65c00');
  ctx.beginPath();
  ctx.arc(0, 0, r*0.28, 0, Math.PI*2);
  ctx.fillStyle = cg;
  ctx.shadowColor = '#ffdd00';
  ctx.shadowBlur  = 22;
  ctx.fill();
  ctx.restore();
}

// Lily — trumpet petals with spots
function drawLily(cx, cy, r, color, bloom) {
  if (bloom <= 0) return;
  const scale = easeOutElastic(Math.min(bloom,1));
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  const petals = 6;
  for (let i = 0; i < petals; i++) {
    const a = (i/petals)*Math.PI*2 - Math.PI/2;
    ctx.save();
    ctx.rotate(a);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-r*0.22, -r*0.35, -r*0.28, -r*0.75, 0, -r*1.05);
    ctx.bezierCurveTo( r*0.28, -r*0.75,  r*0.22, -r*0.35, 0,  0);
    const pg = ctx.createLinearGradient(0, 0, 0, -r*1.05);
    pg.addColorStop(0, rgba(darken(color,0.4), 0.9));
    pg.addColorStop(0.5, rgba(color, 0.88));
    pg.addColorStop(1, rgba(lighten(color,0.45), 0.85));
    ctx.fillStyle = pg;
    ctx.shadowColor = color;
    ctx.shadowBlur  = 22;
    ctx.fill();
    // Spots
    for (let s = 0; s < 5; s++) {
      const st = 0.3 + s*0.12;
      ctx.beginPath();
      ctx.arc(0, -r*st, r*0.03, 0, Math.PI*2);
      ctx.fillStyle = rgba(darken(color,0.6), 0.5);
      ctx.shadowBlur = 0;
      ctx.fill();
    }
    ctx.restore();
  }
  // Stamens
  for (let i = 0; i < 6; i++) {
    const a = (i/6)*Math.PI*2;
    const sx = r*0.25*Math.cos(a), sy = r*0.25*Math.sin(a);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(sx, sy - r*0.55);
    ctx.strokeStyle = rgba(lighten(color,0.5), 0.8);
    ctx.lineWidth = r*0.028;
    ctx.shadowColor = color;
    ctx.shadowBlur  = 10;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(sx, sy - r*0.55, r*0.045, 0, Math.PI*2);
    ctx.fillStyle = '#ffee44';
    ctx.shadowColor = '#ffee00';
    ctx.shadowBlur  = 12;
    ctx.fill();
  }
  ctx.restore();
}

// Poppy — crinkled petals, dark centre
function drawPoppy(cx, cy, r, color, bloom) {
  if (bloom <= 0) return;
  const scale = easeOutElastic(Math.min(bloom,1));
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  const petals = 5;
  for (let i = 0; i < petals; i++) {
    const a = (i/petals)*Math.PI*2;
    ctx.save();
    ctx.rotate(a);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-r*0.5, -r*0.3, -r*0.55, -r*0.9, -r*0.15, -r*1.0);
    ctx.bezierCurveTo( r*0.0,  -r*1.1,  r*0.15, -r*1.0, r*0.55, -r*0.9);
    ctx.bezierCurveTo( r*0.5,  -r*0.3,  0, 0, 0, 0);
    const pg = ctx.createLinearGradient(0,0,0,-r);
    pg.addColorStop(0, rgba(darken(color,0.5), 0.9));
    pg.addColorStop(0.4, rgba(color, 0.92));
    pg.addColorStop(1, rgba(lighten(color,0.4), 0.85));
    ctx.fillStyle = pg;
    ctx.shadowColor = color;
    ctx.shadowBlur  = 24;
    ctx.fill();
    // Crinkle lines
    for (let c = -1; c <= 1; c++) {
      ctx.beginPath();
      ctx.moveTo(0, -r*0.08);
      ctx.bezierCurveTo(c*r*0.15, -r*0.45, c*r*0.2, -r*0.75, c*r*0.05, -r*0.95);
      ctx.strokeStyle = rgba(lighten(color,0.35), 0.35);
      ctx.lineWidth = r*0.03;
      ctx.shadowBlur = 4;
      ctx.stroke();
    }
    ctx.restore();
  }
  // Dark seed pod
  const sg = ctx.createRadialGradient(0,-r*0.08,0,0,0,r*0.22);
  sg.addColorStop(0,'#2a1a5a'); sg.addColorStop(1,'#0d0828');
  ctx.beginPath();
  ctx.arc(0, 0, r*0.22, 0, Math.PI*2);
  ctx.fillStyle = sg;
  ctx.shadowColor = '#6600cc';
  ctx.shadowBlur  = 18;
  ctx.fill();
  // Stigma rays
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(r*0.20*Math.cos(a), r*0.20*Math.sin(a));
    ctx.strokeStyle = rgba(lighten(color,0.4), 0.6);
    ctx.lineWidth = r*0.025;
    ctx.stroke();
  }
  ctx.restore();
}

// Hyacinth — tiny florets along a spike
function drawHyacinth(cx, cy, r, color, bloom) {
  if (bloom <= 0) return;
  const scale = easeOutElastic(Math.min(bloom,1));
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  const rows = 8;
  for (let row = 0; row < rows; row++) {
    const rowBloom = Math.max(0, Math.min(1, bloom * rows - row));
    if (rowBloom <= 0) continue;
    const y = -row * r*0.18 - r*0.1;
    const count = Math.max(2, 5 - Math.floor(row/2));
    for (let i = 0; i < count; i++) {
      const angle = (i/count)*Math.PI*2;
      const fx = Math.cos(angle)*r*(0.30 - row*0.022);
      const fy = Math.sin(angle)*r*(0.22 - row*0.015) + y;
      ctx.save();
      ctx.translate(fx, fy);
      // Small floret
      for (let p = 0; p < 5; p++) {
        const pa = (p/5)*Math.PI*2;
        ctx.beginPath();
        ctx.ellipse(Math.cos(pa)*r*0.08, Math.sin(pa)*r*0.08, r*0.06, r*0.09, pa, 0, Math.PI*2);
        ctx.fillStyle = rgba(color, 0.9 * rowBloom);
        ctx.shadowColor = color;
        ctx.shadowBlur  = 14;
        ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(0, 0, r*0.04, 0, Math.PI*2);
      ctx.fillStyle = rgba(lighten(color,0.5), 0.95*rowBloom);
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.restore();
    }
  }
  ctx.restore();
}

// ── colour utils ──────────────────────────────────────────────────────────────
function darken(hex, factor) {
  let [r,g,b] = hex2rgb(hex);
  r=Math.round(r*factor); g=Math.round(g*factor); b=Math.round(b*factor);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}
function lighten(hex, factor) {
  let [r,g,b] = hex2rgb(hex);
  r=Math.min(255,Math.round(r+(255-r)*factor));
  g=Math.min(255,Math.round(g+(255-g)*factor));
  b=Math.min(255,Math.round(b+(255-b)*factor));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ── BOUQUET DEFINITION ────────────────────────────────────────────────────────
// Each stem: { p0,p1,p2,p3 bezier, width, leafPos:[], flowerFn, flowerR, color, stemStart, stemDur, bloomStart, bloomDur }
function buildBouquet(W, H) {
  const base = [W/2, H + 20];

  return [
    // 0 — Centre tall rose (deep red)
    {
      p0:[base[0], base[1]],
      p1:[base[0]-20, base[1]-H*0.27],
      p2:[base[0]+15, base[1]-H*0.52],
      p3:[base[0]+5,  base[1]-H*0.68],
      width:5, flowerFn:'rose', flowerR:W*0.072, color:'#e8003d',
      leafPos:[0.35, 0.60], leafSides:[-1,1],
      stemStart:0, stemDur:1.1, bloomStart:1.0, bloomDur:1.2,
    },
    // 1 — Left tulip (vivid magenta)
    {
      p0:[base[0]-W*0.06, base[1]],
      p1:[base[0]-W*0.14, base[1]-H*0.24],
      p2:[base[0]-W*0.17, base[1]-H*0.46],
      p3:[base[0]-W*0.18, base[1]-H*0.62],
      width:4, flowerFn:'tulip', flowerR:W*0.055, color:'#ff00aa',
      leafPos:[0.4, 0.65], leafSides:[1,-1],
      stemStart:0.3, stemDur:0.95, bloomStart:1.15, bloomDur:0.9,
    },
    // 2 — Right lily (vivid orange)
    {
      p0:[base[0]+W*0.06, base[1]],
      p1:[base[0]+W*0.14, base[1]-H*0.24],
      p2:[base[0]+W*0.17, base[1]-H*0.46],
      p3:[base[0]+W*0.18, base[1]-H*0.62],
      width:4, flowerFn:'lily', flowerR:W*0.060, color:'#ff6600',
      leafPos:[0.38, 0.62], leafSides:[-1,1],
      stemStart:0.3, stemDur:0.95, bloomStart:1.15, bloomDur:1.0,
    },
    // 3 — Far-left sunflower
    {
      p0:[base[0]-W*0.04, base[1]],
      p1:[base[0]-W*0.22, base[1]-H*0.22],
      p2:[base[0]-W*0.30, base[1]-H*0.44],
      p3:[base[0]-W*0.33, base[1]-H*0.58],
      width:5.5, flowerFn:'sunflower', flowerR:W*0.075, color:'#ffcc00',
      leafPos:[0.3, 0.58], leafSides:[1,-1],
      stemStart:0.5, stemDur:1.0, bloomStart:1.35, bloomDur:1.0,
    },
    // 4 — Far-right poppy (crimson)
    {
      p0:[base[0]+W*0.04, base[1]],
      p1:[base[0]+W*0.22, base[1]-H*0.22],
      p2:[base[0]+W*0.30, base[1]-H*0.44],
      p3:[base[0]+W*0.33, base[1]-H*0.58],
      width:4, flowerFn:'poppy', flowerR:W*0.065, color:'#ff2200',
      leafPos:[0.35, 0.60], leafSides:[-1,1],
      stemStart:0.5, stemDur:1.0, bloomStart:1.35, bloomDur:1.0,
    },
    // 5 — Inner-left daisy (pure white)
    {
      p0:[base[0]-W*0.03, base[1]],
      p1:[base[0]-W*0.10, base[1]-H*0.20],
      p2:[base[0]-W*0.12, base[1]-H*0.40],
      p3:[base[0]-W*0.10, base[1]-H*0.54],
      width:3, flowerFn:'daisy', flowerR:W*0.050, color:'#ffffff',
      leafPos:[0.45], leafSides:[1],
      stemStart:0.7, stemDur:0.85, bloomStart:1.45, bloomDur:0.85,
    },
    // 6 — Inner-right hyacinth (violet/blue)
    {
      p0:[base[0]+W*0.03, base[1]],
      p1:[base[0]+W*0.10, base[1]-H*0.20],
      p2:[base[0]+W*0.12, base[1]-H*0.40],
      p3:[base[0]+W*0.10, base[1]-H*0.54],
      width:3.5, flowerFn:'hyacinth', flowerR:W*0.048, color:'#8833ff',
      leafPos:[0.4], leafSides:[-1],
      stemStart:0.7, stemDur:0.85, bloomStart:1.45, bloomDur:1.0,
    },
    // 7 — Extra-left tulip (cyan)
    {
      p0:[base[0]-W*0.05, base[1]],
      p1:[base[0]-W*0.26, base[1]-H*0.18],
      p2:[base[0]-W*0.38, base[1]-H*0.36],
      p3:[base[0]-W*0.40, base[1]-H*0.48],
      width:3.5, flowerFn:'tulip', flowerR:W*0.048, color:'#00ddff',
      leafPos:[0.45, 0.70], leafSides:[1,-1],
      stemStart:0.9, stemDur:0.9, bloomStart:1.65, bloomDur:0.9,
    },
    // 8 — Extra-right lily (hot pink)
    {
      p0:[base[0]+W*0.05, base[1]],
      p1:[base[0]+W*0.26, base[1]-H*0.18],
      p2:[base[0]+W*0.38, base[1]-H*0.36],
      p3:[base[0]+W*0.40, base[1]-H*0.48],
      width:3.5, flowerFn:'lily', flowerR:W*0.052, color:'#ff00cc',
      leafPos:[0.40, 0.68], leafSides:[-1,1],
      stemStart:0.9, stemDur:0.9, bloomStart:1.65, bloomDur:0.9,
    },
  ];
}

// ── SPARKLE SYSTEM ───────────────────────────────────────────────────────────
const sparks = [];
function spawnSpark(x, y, color) {
  for (let i = 0; i < 4; i++) {
    sparks.push({
      x, y,
      vx: (Math.random()-0.5)*2.5,
      vy: -Math.random()*2.5 - 0.5,
      life: 1,
      decay: 0.018 + Math.random()*0.012,
      r: 1.5 + Math.random()*2,
      color
    });
  }
}
function updateSparks() {
  for (let i = sparks.length-1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy; s.vy += 0.04;
    s.life -= s.decay;
    if (s.life <= 0) { sparks.splice(i,1); continue; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r*s.life, 0, Math.PI*2);
    ctx.fillStyle = rgba(s.color, s.life*0.8);
    ctx.shadowColor = s.color;
    ctx.shadowBlur  = 10;
    ctx.fill();
  }
}

// ── AMBIENT GLOW at bottom ────────────────────────────────────────────────────
function drawGround(W, H, progress) {
  if (progress <= 0) return;
  const g = ctx.createRadialGradient(W/2, H, 0, W/2, H, W*0.55);
  g.addColorStop(0, `rgba(0,60,0,${0.18*progress})`);
  g.addColorStop(0.5,`rgba(0,40,0,${0.10*progress})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, H*0.6, W, H*0.4);
}

// ── MAIN LOOP ────────────────────────────────────────────────────────────────
const TOTAL_DURATION = 5500; // ms total animation
let startTime = null;
let bouquet = null;
let lastSparkTime = 0;

function getFlowerPos(stem) {
  return cubicBezier(stem.p0, stem.p1, stem.p2, stem.p3, 1.0);
}

function frame(ts) {
  if (!startTime) startTime = ts;
  const elapsed = (ts - startTime) / 1000; // seconds

  const W = canvas.width, H = canvas.height;
  if (!bouquet || bouquet._W !== W) {
    bouquet = buildBouquet(W, H);
    bouquet._W = W;
  }

  ctx.clearRect(0, 0, W, H);
  ctx.shadowBlur = 0;

  // Ground glow
  const groundP = Math.min(1, elapsed / 0.8);
  drawGround(W, H, groundP);

  // Draw each stem + flower
  for (const s of bouquet) {
    if (s._W !== W) s._W = W; // force rebuild on resize

    const stemT  = Math.max(0, Math.min(1, (elapsed - s.stemStart) / s.stemDur));
    const bloomT = Math.max(0, Math.min(1, (elapsed - s.bloomStart) / s.bloomDur));
    const stemProgress = easeOut(stemT);

    if (stemProgress <= 0) continue;

    // Draw stem
    drawStemSegment(s.p0, s.p1, s.p2, s.p3, stemProgress, '#3aff00', s.width);

    // Draw leaves
    if (s.leafPos) {
      s.leafPos.forEach((lp, li) => {
        const leafAlpha = Math.max(0, Math.min(1, (stemProgress - lp) / 0.15));
        if (leafAlpha <= 0) return;
        const [lx, ly] = cubicBezier(s.p0, s.p1, s.p2, s.p3, lp);
        const side = s.leafSides[li] || 1;
        // Tangent direction for leaf angle
        const eps = 0.01;
        const [ax,ay] = cubicBezier(s.p0,s.p1,s.p2,s.p3, Math.max(0,lp-eps));
        const [bx,by] = cubicBezier(s.p0,s.p1,s.p2,s.p3, Math.min(1,lp+eps));
        const tangAngle = Math.atan2(by-ay, bx-ax);
        const leafAngle = tangAngle + side * (Math.PI/2 - 0.4);
        drawLeaf(lx, ly, leafAngle, W*0.042, '#00cc44', leafAlpha);
      });
    }

    // Spawn sparks when flower first blooms
    if (bloomT > 0 && bloomT < 0.15 && ts - lastSparkTime > 60) {
      const [fx, fy] = getFlowerPos(s);
      spawnSpark(fx, fy, s.color);
      lastSparkTime = ts;
    }

    // Draw flower
    if (bloomT > 0) {
      const [fx, fy] = getFlowerPos(s);
      const bloom = easeOut(bloomT);
      ctx.save();
      switch(s.flowerFn) {
        case 'rose':      drawRose(fx, fy, s.flowerR, s.color, bloom); break;
        case 'tulip':     drawTulip(fx, fy, s.flowerR, s.color, bloom); break;
        case 'sunflower': drawSunflower(fx, fy, s.flowerR, bloom); break;
        case 'daisy':     drawDaisy(fx, fy, s.flowerR, s.color, bloom); break;
        case 'lily':      drawLily(fx, fy, s.flowerR, s.color, bloom); break;
        case 'poppy':     drawPoppy(fx, fy, s.flowerR, s.color, bloom); break;
        case 'hyacinth':  drawHyacinth(fx, fy, s.flowerR, s.color, bloom); break;
      }
      ctx.restore();
    }
  }

  // Sparkles
  ctx.save();
  updateSparks();
  ctx.restore();

  // Gentle sway after everything is bloomed
  if (elapsed > 4.5) {
    const swayT = elapsed - 4.5;
    bouquet.forEach((s, si) => {
      const phase = si * 0.7;
      const sway = Math.sin(swayT * 0.8 + phase) * 0.012;
      // Apply sway by tweaking control points — store originals once
      if (!s._origP1) {
        s._origP1 = [...s.p1];
        s._origP2 = [...s.p2];
        s._origP3 = [...s.p3];
      }
      s.p1[0] = s._origP1[0] + s._origP1[0]*sway*0.15;
      s.p2[0] = s._origP2[0] + s._origP2[0]*sway*0.25;
      s.p3[0] = s._origP3[0] + s._origP3[0]*sway*0.30;
    });
  }

  ctx.shadowBlur = 0;
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
